name: Chromatic Visual Regression

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

jobs:
  chromatic:
    name: Run Chromatic
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 전체 히스토리 필요 (Chromatic baseline 비교용)

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Token Drift Check
        run: npm run check:tokens

      - name: Run Chromatic
        uses: chromaui/action@v11
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          buildScriptName: build-storybook
          exitZeroOnChanges: true   # 변경 감지해도 PR 블로킹 안 함 (디자이너 리뷰로 처리)
          onlyChanged: true         # 변경된 story만 스냅샷 (속도 최적화)
